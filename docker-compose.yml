version: '3'

services:
  db:
    image: postgresql
    environment:
      - POSTGRES_DB=syncapod
      - POSTGRES_USER=syncapod
      - POSTGRE_PASSWORD=${db_pass}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - backend

  syncapod:
    build: .
    command: go run cmd/main.go
    volumes:
      syncapod-code:/code
    networks:
      - overlay
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - db

  volumes:
    pg-data:
    syncapod-code:

  networks:
    backend: